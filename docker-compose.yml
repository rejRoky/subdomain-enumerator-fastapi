services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: subdomain-enumerator:latest
    container_name: subdomain-api
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      VT_API_KEY: ${VT_API_KEY:-}
      MAX_JOBS: ${MAX_JOBS:-100}
      JOB_TTL_SECONDS: ${JOB_TTL_SECONDS:-3600}
      CORS_ORIGINS: ${CORS_ORIGINS:-["*"]}
      DEBUG: ${DEBUG:-false}
    env_file:
      - path: .env
        required: false   # optional — works fine without it
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - subdomain-net

networks:
  subdomain-net:
    driver: bridge
